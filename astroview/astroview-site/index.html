<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AstroView - FITS Viewer for Astronomical Imaging</title>
  <link rel="icon" type="image/png" href="resources/icons/main_icon.png" />
  <link rel="stylesheet" href="styles.css" />
  <meta name="ext-resource-dependency" content="data/crop.png" data-resource-id="cropImg" />
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#fafaf7">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#fafaf7"/>
      <g transform="translate(600 400)">
        <circle r="180" fill="none" stroke="#1f2230" stroke-width="6"/>
        <circle r="4" fill="#1f2230"/>
        <line x1="0" y1="-180" x2="0" y2="-220" stroke="#3a6dd0" stroke-width="6"/>
        <line x1="180" y1="0" x2="220" y2="0" stroke="#3a6dd0" stroke-width="6"/>
        <circle cx="-80" cy="-40" r="6" fill="#1f2230"/>
        <circle cx="60" cy="70" r="10" fill="#1f2230"/>
        <circle cx="-30" cy="110" r="4" fill="#1f2230"/>
        <circle cx="120" cy="-90" r="5" fill="#1f2230"/>
        <text x="0" y="290" text-anchor="middle" font-family="monospace" font-size="40" fill="#1f2230" font-weight="600">AstroView</text>
      </g>
    </svg>
  </template>
  <canvas id="starfield"></canvas>
  <div id="app" class="page"></div>

  <script>
    window.AV_TWEAKS = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "accent": "blue",
      "starfield": false,
      "language": "zh"
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="content.js"></script>
  <script type="text/babel" src="viewer.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function initStarfield() {
      const cv = document.getElementById('starfield');
      const ctx = cv.getContext('2d');
      let stars = [];
      let w = 0;
      let h = 0;

      const resize = () => {
        w = cv.width = window.innerWidth;
        h = cv.height = window.innerHeight;
        stars = [];
        for (let i = 0; i < 120; i += 1) {
          stars.push({
            x: Math.random() * w,
            y: Math.random() * h,
            r: Math.random() * 1.2 + 0.2,
            a: Math.random() * 0.6 + 0.2,
            tw: Math.random() * 0.03 + 0.005,
            p: Math.random() * Math.PI * 2,
          });
        }
      };

      resize();
      window.addEventListener('resize', resize);

      let raf;
      const loop = (t) => {
        const dark = document.documentElement.getAttribute('data-theme') === 'dark';
        ctx.clearRect(0, 0, w, h);
        stars.forEach((s) => {
          const alpha = s.a * (0.6 + 0.4 * Math.sin(t * s.tw + s.p));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = dark
            ? `oklch(90% 0.02 250 / ${alpha})`
            : `oklch(55% 0.05 250 / ${alpha * 0.5})`;
          ctx.fill();
        });
        raf = requestAnimationFrame(loop);
      };

      loop(0);
      return () => cancelAnimationFrame(raf);
    }

    initStarfield();

    function Tweaks({ show, theme, setTheme, accent, setAccent, starfield, setStarfield, lang, setLang }) {
      const accents = [
        { k: 'blue', c: 'oklch(55% 0.15 250)' },
        { k: 'violet', c: 'oklch(55% 0.18 300)' },
        { k: 'amber', c: 'oklch(68% 0.14 60)' },
        { k: 'teal', c: 'oklch(58% 0.12 180)' },
        { k: 'crimson', c: 'oklch(55% 0.18 20)' },
      ];

      return (
        <div className={'tweaks' + (show ? ' show' : '')}>
          <div className="tweaks-head">
            <span>Tweaks</span>
            <span className="mono">AstroView</span>
          </div>
          <div className="tweak-row">
            <span className="tweak-label">Theme</span>
            <button
              className={'toggle' + (theme === 'dark' ? ' on' : '')}
              onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
            />
          </div>
          <div className="tweak-row">
            <span className="tweak-label">Accent color</span>
            <div className="swatch-row">
              {accents.map((a) => (
                <span
                  key={a.k}
                  className={'swatch' + (accent === a.k ? ' active' : '')}
                  style={{ background: a.c }}
                  onClick={() => setAccent(a.k)}
                />
              ))}
            </div>
          </div>
          {theme === 'dark' && (
            <div className="tweak-row">
              <span className="tweak-label">{lang === 'zh' ? '点亮星空' : 'Light up the sky'}</span>
              <button
                className={'toggle' + (starfield ? ' on' : '')}
                onClick={() => setStarfield(!starfield)}
              />
            </div>
          )}
          <div className="tweak-row">
            <span className="tweak-label">Language</span>
            <button className="lang-btn" onClick={() => setLang(lang === 'en' ? 'zh' : 'en')}>
              {lang === 'en' ? 'English' : '简体中文'}
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const d = window.AV_TWEAKS;
      const [lang, setLang] = useState(d.language || 'en');
      const [theme, setTheme] = useState(d.theme || 'light');
      const [accent, setAccent] = useState(d.accent || 'blue');
      const [starfield, setStarfield] = useState(!!d.starfield);
      const [tweaksOn, setTweaksOn] = useState(false);
      const [standalone, setStandalone] = useState(false);

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', theme);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme } }, '*');
      }, [theme]);

      useEffect(() => {
        const hues = { blue: 250, violet: 300, amber: 60, teal: 180, crimson: 20 };
        const chromas = { blue: 0.15, violet: 0.18, amber: 0.14, teal: 0.12, crimson: 0.18 };
        document.documentElement.style.setProperty('--accent', `oklch(55% ${chromas[accent]} ${hues[accent]})`);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent } }, '*');
      }, [accent]);

      useEffect(() => {
        document.getElementById('starfield').classList.toggle('on', starfield);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { starfield } }, '*');
      }, [starfield]);

      useEffect(() => {
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { language: lang } }, '*');
      }, [lang]);

      useEffect(() => {
        const handler = (e) => {
          if (!e.data || !e.data.type) return;
          if (e.data.type === '__activate_edit_mode') {
            setTweaksOn(true);
            setStandalone(false);
          } else if (e.data.type === '__deactivate_edit_mode') {
            setTweaksOn(false);
          }
        };

        window.addEventListener('message', handler);
        if (window.parent === window) {
          setStandalone(true);
        } else {
          window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        }
        return () => window.removeEventListener('message', handler);
      }, []);

      const t = window.AV_I18N[lang];

      return (
        <>
          <window.AV_Nav t={t} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} />
          <window.AV_Hero t={t} lang={lang} />
          <window.AV_Features t={t} />
          <window.AV_ReleaseNotes t={t} lang={lang} />
          <window.AV_Quickstart t={t} />
          <window.AV_Specs t={t} lang={lang} />
          <window.AV_ChangelogFull t={t} lang={lang} />
          <window.AV_Footer t={t} />
          <Tweaks
            show={tweaksOn}
            theme={theme}
            setTheme={setTheme}
            accent={accent}
            setAccent={setAccent}
            starfield={starfield}
            setStarfield={setStarfield}
            lang={lang}
            setLang={setLang}
          />
          {standalone && (
            <button
              className="tweaks-fab"
              onClick={() => setTweaksOn(!tweaksOn)}
              title={lang === 'zh' ? '设置' : 'Settings'}
              aria-label="settings"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
              </svg>
            </button>
          )}
        </>
      );
    }

    const tryMount = () => {
      if (!window.AV_Nav || !window.ViewerDemo) {
        setTimeout(tryMount, 40);
        return;
      }
      ReactDOM.createRoot(document.getElementById('app')).render(<App />);
    };

    tryMount();
  </script>
</body>
</html>
